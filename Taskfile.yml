version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - go-task --list

  sandbox:build:
    desc: Build sandbox Docker image
    cmds:
      - docker build -t bunker-sandbox .

  sandbox:run:
    desc: Run sandbox with VPN + opencode (requires VPN config)
    cmds:
      - docker run --rm -it --cap-add=NET_ADMIN --device /dev/net/tun bunker-sandbox

  sandbox:run-no-vpn:
    desc: Run sandbox without VPN (opencode only)
    cmds:
      - docker run --rm -it bunker-sandbox

  sandbox:shell:
    desc: Enter sandbox shell for debugging
    cmds:
      - docker run --rm -it bunker-sandbox bash

  sandbox:clean:
    desc: Remove bunker-sandbox image
    cmds:
      - docker rmi bunker-sandbox

  sandbox:logs:
    desc: View logs from running sandbox
    cmds:
      - docker logs bunker-sandbox

  config:setup:
    desc: Setup opencode config from ~/.config/opencode
    cmds:
      - echo "Creating config directory..."
      - mkdir -p config
      - echo "Copying opencode config..."
      - cp ~/.config/opencode/opencode.json config/opencode.json
      - echo "opencode config copied to config/opencode.json"
